{% extends 'base.html' %}

{% block content %}
<h2>Login</h2>

<form method="POST">
    <input type="email" name="email" placeholder="Email" required><br><br>
    <input type="password" name="password" placeholder="Contraseña" required><br><br>
    <button type="submit">Ingresar</button>
</form>

{% if mensaje %}
<p style="color:red;">{{ mensaje }}</p>
{% endif %}

{% endblock %}
