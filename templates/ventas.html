<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Ventas</title>

<style>
body {
    margin: 0;
    font-family: Arial;
    background: linear-gradient(135deg, #0f2027, #203a43, #2c5364);
    color: white;
}

.sidebar {
    width: 220px;
    height: 100vh;
    position: fixed;
    background: rgba(0,0,0,0.6);
    padding-top: 20px;
}

.sidebar h2 {
    text-align: center;
}

.sidebar a {
    display: block;
    padding: 15px;
    color: white;
    text-decoration: none;
}

.sidebar a:hover {
    background: #00c6ff;
}

.main {
    margin-left: 220px;
    padding: 30px;
}

form {
    background: rgba(255,255,255,0.1);
    padding: 20px;
    border-radius: 10px;
    width: 350px;
}

select, input {
    width: 100%;
    padding: 10px;
    margin: 10px 0;
    border-radius: 5px;
    border: none;
}

button {
    width: 100%;
    padding: 10px;
    background: #00c6ff;
    border: none;
    color: white;
    border-radius: 5px;
    font-weight: bold;
}

button:hover {
    background: #009ec3;
}
</style>

</head>
<body>

<div class="sidebar">
    <h2>📱 Sistema</h2>
    <a href="/panel">🏠 Inicio</a>
    <a href="/productos">📦 Productos</a>
    <a href="/ventas">💰 Ventas</a>
    <a href="/logout">🚪 Salir</a>
</div>

<div class="main">

<h2>💰 Registrar Venta</h2>

<form method="POST">

<label>Producto:</label>
<select name="producto" required>
{% for p in productos %}
<option value="{{ p[0] }}">
{{ p[1] }} - {{ p[2] }} (Stock: {{ p[5] }})
</option>
{% endfor %}
</select>

<label>Cantidad:</label>
<input type="number" name="cantidad" placeholder="Cantidad a vender" min="1" required>

<label>Precio de venta:</label>
<input type="number" step="0.01" name="precio" placeholder="Precio de venta" required>

<label>Fecha:</label>
<input type="date" name="fecha" required>

<button>Registrar Venta</button>

</form>

</div>

</body>
</html>
