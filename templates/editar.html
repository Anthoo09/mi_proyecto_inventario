<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Editar Producto</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
    <div class="panel">
        <h1>Editar Producto</h1>
        <form action="{{ url_for('editar', id=producto[0]) }}" method="POST">
            <input type="text" name="nombre" value="{{ producto[1] }}" required>
            <input type="number" name="cantidad" value="{{ producto[2] }}" required>
            <input type="number" step="0.01" name="precio" value="{{ producto[3] }}" required>
            <button type="submit">Guardar Cambios</button>
        </form>
        <a href="{{ url_for('productos') }}">Cancelar</a>
    </div>
</body>
</html>
